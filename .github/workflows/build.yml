name: Build snapshot

on:
  push:
    branches:
      - main

jobs:
  build_snapshot:
    name: Build snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 25
        uses: actions/setup-java@v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v6.2.0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          cache-provider: basic
      - name: Get commit short sha
        id: get_sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
      - name: Build with Gradle and set runId
        run: ./gradlew test shadowJar -Psha=${{ env.sha }} -Psnap
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          path: build/libs/VOTL-*
          overwrite: true
          archive: false
